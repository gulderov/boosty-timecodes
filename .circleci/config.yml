version: 2.1
orbs:
  node: circleci/node@5
jobs:
  test-node:
    docker:
      - image: mcr.microsoft.com/playwright:v1.47.0-jammy
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Run tests
          command: npm test
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
workflows:
  build-and-test:
    jobs:
      - test-node:
        filters:
          branches:
            only:
              - circleci-project-setup
  nightly:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - test-node
